name: Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build:
    name: Compilazione nel container Docker del corso
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repository
        uses: actions/checkout@v4

      - name: Cache immagine Docker
        id: cache-docker
        uses: actions/cache@v4
        with:
          path: /tmp/docker-cache
          key: docker-${{ hashFiles('Dockerfile') }}

      - name: Carica immagine dalla cache
        if: steps.cache-docker.outputs.cache-hit == 'true'
        run: docker load -i /tmp/docker-cache/qt-course-env.tar

      - name: Build immagine Docker
        if: steps.cache-docker.outputs.cache-hit != 'true'
        run: docker build -t qt-course-env .

      - name: Salva immagine in cache
        if: steps.cache-docker.outputs.cache-hit != 'true'
        run: |
          mkdir -p /tmp/docker-cache
          docker save qt-course-env -o /tmp/docker-cache/qt-course-env.tar

      - name: Compila il progetto
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            -w /app \
            -e PATH="/usr/lib/qt6/bin:/usr/bin:/bin" \
            qt-course-env \
            bash -c "qmake ActivityManager.pro && make -j$(nproc) 2>&1 | tee build.log"

      - name: Salva log di compilazione
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log

      # Errori bloccano la CI, warning sono segnalati ma tollerati (vincolo 4)
      - name: Controlla errori e warning
        run: |
          if grep -i "error:" build.log; then
            echo "Trovati errori di compilazione."
            exit 1
          fi
          if grep -i "warning:" build.log; then
            echo "Trovati warning (tollerati ma penalizzati)."
          fi