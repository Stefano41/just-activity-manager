name: Build Check

# Eseguito ad ogni push e pull request su main e develop
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build:
    name: Compilazione nel container Docker del corso
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repository
        uses: actions/checkout@v4

      # Costruisce l'immagine Docker dal Dockerfile del corso
      - name: Build immagine Docker
        run: docker build -t qt-course-env .

      # Compila il progetto dentro il container
      # Si assume che il .pro sia nella root del repository
      - name: Compila il progetto
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            -w /app \
            qt-course-env \
            bash -c "qmake ActivityManager.pro && make -j$(nproc) 2>&1 | tee build.log"

      # Carica il log di compilazione come artefatto scaricabile
      - name: Salva log di compilazione
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log

      # Fallisce se ci sono errori (i warning sono tollerati ma segnalati)
      - name: Controlla presenza di errori
        run: |
          if grep -i "error:" build.log; then
            echo "Trovati errori di compilazione."
            exit 1
          fi
          if grep -i "warning:" build.log; then
            echo "Trovati warning (tollerati ma penalizzati)."
          fi