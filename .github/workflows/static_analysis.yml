name: Analisi Statica

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  cppcheck:
    name: cppcheck sul codice sorgente
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repository
        uses: actions/checkout@v4

      - name: Build immagine Docker
        run: docker build -t qt-course-env .

      # Esegue cppcheck dentro il container sul codice del modello logico
      # --enable=all          : abilita tutti i controlli
      # --suppress=missingInclude : ignora Qt headers non trovati
      # --error-exitcode=1    : fallisce la CI se trova errori reali
      - name: Esegui cppcheck
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            -w /app \
            qt-course-env \
            bash -c "cppcheck \
              --enable=all \
              --suppress=missingInclude \
              --suppress=unmatchedSuppression \
              --inline-suppr \
              --error-exitcode=1 \
              --output-file=cppcheck_report.txt \
              --template='{file}:{line}: {severity}: {message}' \
              src/ 2>&1 | tee cppcheck_output.log"

      # Salva il report come artefatto
      - name: Salva report cppcheck
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cppcheck-report
          path: |
            cppcheck_report.txt
            cppcheck_output.log

      # Mostra un riassunto nel log della CI
      - name: Mostra riassunto
        if: always()
        run: |
          echo "=== RISULTATI CPPCHECK ==="
          cat cppcheck_report.txt || echo "Nessun problema trovato."
