name: Static Analysis

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  cppcheck:
    name: cppcheck sul codice sorgente
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repository
        uses: actions/checkout@v4

      - name: Cache immagine Docker
        id: cache-docker
        uses: actions/cache@v4
        with:
          path: /tmp/docker-cache
          key: docker-${{ hashFiles('Dockerfile') }}

      - name: Carica immagine dalla cache
        if: steps.cache-docker.outputs.cache-hit == 'true'
        run: docker load -i /tmp/docker-cache/qt-course-env.tar

      - name: Build immagine Docker
        if: steps.cache-docker.outputs.cache-hit != 'true'
        run: docker build -t qt-course-env .

      - name: Salva immagine in cache
        if: steps.cache-docker.outputs.cache-hit != 'true'
        run: |
          mkdir -p /tmp/docker-cache
          docker save qt-course-env -o /tmp/docker-cache/qt-course-env.tar

      - name: Esegui cppcheck
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            -w /app \
            qt-course-env \
            bash -c "
              cppcheck \
                --enable=all \
                --suppress=missingInclude \
                --suppress=unmatchedSuppression \
                --inline-suppr \
                --error-exitcode=1 \
                --output-file=cppcheck_report.txt \
                --template='{file}:{line}: {severity}: {message}' \
                src/ 2>&1 | tee cppcheck_output.log"

      - name: Mostra riassunto
        if: always()
        run: cat cppcheck_report.txt || echo "Nessun problema trovato."

      - name: Salva report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cppcheck-report
          path: |
            cppcheck_report.txt
            cppcheck_output.log