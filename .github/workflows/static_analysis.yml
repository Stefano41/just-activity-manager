name: Static Analysis

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  cppcheck:
    name: cppcheck sul codice sorgente
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repository
        uses: actions/checkout@v4

      - name: Pull immagine Docker del corso
        run: docker pull unipd-oop/qt-env:2025

      # Installa cppcheck (non presente nell'immagine del corso)
      - name: Esegui cppcheck
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            -w /app \
            --user root \
            unipd-oop/qt-env:2025 \
            bash -c "
              apt-get update -q && apt-get install -y -q cppcheck &&
              cppcheck \
                --enable=all \
                --suppress=missingInclude \
                --suppress=unmatchedSuppression \
                --inline-suppr \
                --error-exitcode=1 \
                --output-file=cppcheck_report.txt \
                --template='{file}:{line}: {severity}: {message}' \
                src/ 2>&1 | tee cppcheck_output.log"

      - name: Mostra riassunto
        if: always()
        run: cat cppcheck_report.txt || echo "Nessun problema trovato."

      - name: Salva report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cppcheck-report
          path: |
            cppcheck_report.txt
            cppcheck_output.log