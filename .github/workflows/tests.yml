name: Unit Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Test unitari + verifica Docker
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repository
        uses: actions/checkout@v4

      # ── 1. Build immagine (include lcov e cppcheck) ─────────────────────────
      - name: Build immagine Docker
        run: docker build -t qt-course-env .

      # ── 2. Verifica che il container si avvii e Qt sia disponibile ──────────
      # Il PATH viene impostato esplicitamente perche qmake in Ubuntu 24.04
      # con Qt6 si trova in /usr/lib/qt6/bin e non e' nel PATH di default
      - name: Verifica ambiente nel container
        run: |
          docker run --rm \
            -e PATH="/usr/lib/qt6/bin:/usr/bin:/bin" \
            qt-course-env \
            bash -c "
              echo '=== Verifica ambiente ===' &&
              qmake --version &&
              make --version &&
              g++ --version &&
              lcov --version &&
              cppcheck --version &&
              echo '=== Container operativo ==='"

      # ── 3. Compila ed esegui i test ─────────────────────────────────────────
      # QT_QPA_PLATFORM=offscreen: evita errori di display in ambiente headless
      # --coverage: strumenta il codice per gcov
      - name: Compila ed esegui i test
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            -w /app/tests \
            -e QT_QPA_PLATFORM=offscreen \
            -e PATH="/usr/lib/qt6/bin:/usr/bin:/bin" \
            qt-course-env \
            bash -c "
              qmake tests.pro &&
              make -j$(nproc) &&
              ./tests -v2 -o ../test_results.xml,xunitxml 2>&1 | tee ../test_output.log""

      # ── 4. Genera report di copertura con lcov ──────────────────────────────
      - name: Genera report copertura
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            -w /app/tests \
            -e PATH="/usr/lib/qt6/bin:/usr/bin:/bin" \
            qt-course-env \
            bash -c "
              lcov --capture \
                   --directory . \
                   --output-file coverage.info &&
              lcov --remove coverage.info \
                   '/usr/*' '*/tests/*' '*/Qt/*' \
                   --output-file coverage.info"

      # ── 5. Invia copertura a Coveralls ─────────────────────────────────────
      - name: Invia a Coveralls
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path-to-lcov: tests/coverage.info

      # ── 6. Pubblica risultati test su GitHub ────────────────────────────────
      - name: Pubblica risultati test
        if: always()
        uses: mikepenz/action-junit-report@v4
        with:
          report_paths: test_results.xml
          check_name: Risultati Qt Test

      # ── 7. Salva artefatti ──────────────────────────────────────────────────
      - name: Salva artefatti
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            test_results.xml
            test_output.log
            tests/coverage.info
